<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Virtual</title>

    
    <link rel="stylesheet" href="../css/style_carrinho.css">
    <link rel="shortcut icon" href="../imagens/icones/favicon.ico" type="image/x-icon">

    <script type="module" src="../js/monta_tela_carrinho.js" defer></script>
</head>
<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="../index.html">
                    <img src="../imagens/icones/logo.png" alt="logo">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html" class="lnk_menu"> Home </a></li>
                    <li><a href="../paginas/cadastro.html" class="lnk_menu"> Cadastro </a></li>
                    <li><a href="../paginas/sobre.html" class="lnk_menu"> Sobre </a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li><a href="login.html" class="lnk_icone"><img src="../imagens/icones/login.png" alt="">Login</a></li>
                    <li><a href="carrinho.html" class="lnk_icone"><img src="../imagens/icones/carrinho.png" alt="">Carrinho</a></li>
                </ul>
            </div>
        </header>

        <section id="pesquisa">
            <h3>Carrinho</h3>
        </section>

        <section id="carrinho">
          <section id="itens-carrinho">
            <section class="item">
                <img src="../imagens/adidas2.webp" alt="adidas2" class="img_card">
                <p class="descricao"> adidas 2</p>
                <p class="vlr-unitario">R$ 45.00 Kg</p>
                <input type="number" name="quant01" id="quant01" class="input-item" value="1">
                <h2 class="tito_card">adidas2</h2>
                <img src="../imagens/icones/x.png" alt="" class="img-remover">
            </section>

            <section class="item">
                <img src="../imagens/Balenciaga mendigo.jfif" alt="balenciaga" class="img_card">
                <p class="vlr-unitario">R$ 45.00 Kg</p>
                <h2 class="tito_card">Balenciaga Mendigo</h2>

                <input type="number" name="quant01" id="quant01" class="input-item" value="1">
                <img src="../imagens/icones/x.png" alt="" class="img-remover">
            </section>

            <section class="item">
                <img src="../imagens/Converse.jpg" alt="converse" class="img_card">
                <p class="vlr-unitario">R$ 45.00 Kg</p>
                <h2 class="tito_card">Converse</h2>
                <input type="number" name="quant01" id="quant01" class="input-item" value="1">
                
                <img src="../imagens/icones/x.png" alt="" class="img-remover">
            </section>

            <section class="item">
                <img src="../imagens/crocs.webp" alt="crocs" class="img_card">
                <p class="vlr-unitario">R$ 45.00 Kg</p>
                <h2 class="tito_card">Crocs</h2>
                <input type="number" name="quant01" id="quant01" class="input-item" value="1">
                
                <img src="../imagens/icones/x.png" alt="" class="img-remover">
            </section>
        </section>
         
        
        <div id="valores-carrinho">

            <div id="div-cep">
                <h2 class="titulo-valores-carrinho">CEP</h2>
                <div id="input-cep"><input type="text" name="input-cep" id="input-cep" class="input-cep"></div>
            </div>

            <div id="div-calc-valor">
                <h2 class="titulo-valores-carrinho">Valor Total</h2>
                <p id="valor-total" class="valor">R$ 100,00</p>

                <h2 class="titulo-valores-carrinho">Valor Frete</h2>
                <p id="valor-total" class="valor">R$ 10,00</p>
            </div>

            <div id="div-calc-valor-pagar">
                <h2 class="titulo-valores-carrinho">Total a Pagar</h2>
                <p id="valor-Pagar" class="valor">R$ 100,00</p>
            </div>

            <button id="btn-continuar" class="btn-carrinho">Continuar Compra</button>
            <button id="btn-finalizar" class="btn-carrinho">Finalizar Compra</button>
        </div>
    </section>

        <footer id="rodape">
            <div id="dadosLoja">
                <h2>Rua 10</h2>
                <h1>Aracaju</h1>
            </div>
            
            <div id="icones-sociais">
                <ul>
                    <li><a href="https://www.instagram.com"></a><img src="../imagens/icones/instagram.png" 
                        alt="ícone instagram"></li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="../imagens/icones/hipercard.png" alt="hipercard">
            </div>
        </footer>
    </main>
</body>
</html>
