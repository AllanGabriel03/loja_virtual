<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Virtual</title>

    <link rel="stylesheet" href="../css/style_estrutura_paginas.css">
    <link rel="stylesheet" href="../css/style_formulario.css
    ">
    <link rel="shortcut icon" href="../imagens/icones/favicon.ico" type="image/x-icon">
</head>
<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="index.html">
                    <img src="imagens/icones/logo.png" alt="logo">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="index.html" class="lnk_menu"> Home </a></li>
                    <li><a href="paginas/cadastro.html" class="lnk_menu"> Cadastro </a></li>
                    <li><a href="paginas/sobre.html" class="lnk_menu"> Sobre </a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li><a href="/paginas/login.html" class="lnk_icone"><img src="imagens/icones/login.png" alt="">Login</a></li>
                    <li><a href="/paginas/carrinho.html" class="lnk_icone"><img src="imagens/icones/carrinho.png" alt="">Carrinho</a></li>
                </ul>
            </div>
        </header>

        <section id="pesquisa">
            <input type="text">
        </section>

        <section id="formulario">
            <h3>Cadastro</h3>

            <form id="form-pessoa">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" class="input01" required maxlength="60" placeholder="Digite seu nome">

                <label for="cpf">CPF</label>
                <input type="text" name="cpf" id="cpf" class="input01" required maxlength="60" placeholder="Digite seu CPF">
                
                <label for="dataNascimento">Data de Nascimento</label>
                <input type="text" name="dataNascimento" id="dataNascimento" class="input02" required maxlength="60" placeholder="Informe sua data de nascimento">
            
                <label for="cep">CEP</label>
                <input type="radio" name="sexo" id="sexoM" class="inputOP" value="M">Masculino
                <input type="radio" name="sexo" id="sexoF" class="inputOP" value="F">Feminino
                <input type="radio" name="sexo" id="sexoN" class="inputOP" value="N">Não Declarar

                <input type="text" name="cep" id="cep" class="input02" required maxlength="9" placeholder="Digite seu CEP">
                
                <div id="div-dados-endereco" class="oculto">
                    <label for="logradouro">Logradouro</label>
                    <input for="logradouro" id="logradouro" class="input01">

                    <label for="num-residencia">Número</label>
                    <input for="num-residencia" id="num-residencia" class="input01" maxlength="10" placeholder="Digite o número da residencia">

                    <label for="complemento-end">Complemento</label>
                    <input for="complemento-end" id="complemento-end" class="input01" maxlength="100" placeholder="Digite o complemento">

                    <label for="bairro">Bairro</label>
                    <input for="bairro" id="bairro" class="input01">

                    <label for="localidade">Localidade</label>
                    <input for="localidade" id="localidade" class="input01">

                    <label for="uf">UF</label>
                    <input for="uf" id="uf" class="input02">

                </div>

                <label for="senha"> Senha </label>
                <input type="password" name="senha" id="senha" class="input02" required maxlength="6" placeholder="Informe a senha">

                <div id="div-btns">
                    <button type="submit" id="btn-add"> Cadastrar </button>
                <button type="reset" id="btn-limpar"> Limpar </button>
                </div>
            
            </form>
        </section>


        <footer id="rodape">
            <div id="dadosLoja">
                <h2>Rua 10</h2>
                <h1>Aracaju</h1>
            </div>
            
            <div id="icones-sociais">
                <ul>
                    <li><a href="https://www.instagram.com"></a><img src="imagens/icones/instagram.png" 
                        alt="ícone instagram"></li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="imagens/icones/hipercard.png" alt="hipercard">
            </div>
        </footer>
    </main>
</body>
</html>
